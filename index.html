<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofiyka's Links</title>
    <meta name="description" content="My personal page and social links">
    <meta name="theme-color" content="#fdfbfb">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --text-main: #2d3436;
            --text-muted: #636e72;
            --btn-bg: rgba(255, 255, 255, 0.7);
            --btn-border: rgba(255, 255, 255, 0.5);
            --btn-hover: #ff7675;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: var(--text-main);
        }

        .profile-container {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeIn 1s ease-in;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        p.bio {
            font-size: 15px;
            color: var(--text-muted);
            max-width: 300px;
            margin: 0 auto;
        }

        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Глассморфизм для кнопки */
        .link-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 16px;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .link-btn:hover, .link-btn:active {
            background: var(--btn-hover);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 118, 117, 0.4);
        }

        .footer {
            margin-top: auto;
            padding-top: 40px;
            font-size: 12px;
            color: var(--text-muted);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="avatar.jpg" alt="Sofiyka" class="avatar">
        <h1>@sofi.ykax</h1>
        <p class="bio">Good girl on IG, completely different in private... 😈</p>
    </div>

    <div class="links-container">
        <a href="ТВОЯ_ССЫЛКА_ИЗ_MYLEAD" class="link-btn" rel="nofollow noopener">
            🌶️ Find my Secret Dating Profile
        </a>
        
        <a href="https://instagram.com/твой_профиль" class="link-btn">
            📸 Back to Instagram
        </a>
    </div>

    <div class="footer">
        © 2026 Sofiyka. All rights reserved.
    </div>

</body>
</html>
